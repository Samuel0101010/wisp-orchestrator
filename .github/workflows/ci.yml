name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel earlier in-flight runs of the same ref when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm -r --filter "./packages/**" run build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Validate design tokens
        run: pnpm --filter dashboard-web tokens:check

      - name: Encoding check (mojibake guardrail)
        run: pnpm encoding:check

      - name: Inventory freshness check
        run: pnpm inventory:check

      # Build BEFORE running unit tests so the dashboard-server's
      # `serve-web.test.ts` (which is `describe.skipIf(!haveDist)` against
      # the web bundle) actually exercises its 4 assertions instead of
      # silently skipping. The previous order had tests running before
      # build, so the SPA-fallback regression never ran in CI.
      - name: Build
        run: pnpm build

      - name: Test (unit)
        run: pnpm --filter "./packages/**" --filter "./apps/**" --filter "./tests/compliance" run test

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @wisp/e2e exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @wisp/e2e exec playwright install-deps chromium

      - name: Run Playwright smoke
        run: pnpm --filter @wisp/e2e run test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

  evals:
    name: evals
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    # Opt-in: only runs when RUN_EVALS repo variable is set to "true".
    # The eval step also requires the ANTHROPIC_API_KEY secret — if missing,
    # promptfoo fails the step with a clear provider-auth error. (GitHub
    # Actions forbids secrets.* in job-level `if:` conditions, so the secret
    # cannot be gated here.) Promptfoo evals consume API budget.
    if: ${{ vars.RUN_EVALS == 'true' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run promptfoo evals
        run: pnpm eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
