name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier in-flight runs of the same ref when a new one starts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Validate design tokens
        run: pnpm --filter dashboard-web tokens:check

      - name: Test (unit)
        run: pnpm --filter "./packages/**" --filter "./apps/**" --filter "./tests/compliance" run test

      - name: Build
        run: pnpm build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/e2e/package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @agent-harness/e2e exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @agent-harness/e2e exec playwright install-deps chromium

      - name: Run Playwright smoke
        run: pnpm --filter @agent-harness/e2e run test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

  evals:
    name: evals
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    # Opt-in: only runs when RUN_EVALS repo variable is set to "true".
    # The eval step also requires the ANTHROPIC_API_KEY secret — if missing,
    # promptfoo fails the step with a clear provider-auth error. (GitHub
    # Actions forbids secrets.* in job-level `if:` conditions, so the secret
    # cannot be gated here.) Promptfoo evals consume API budget.
    if: ${{ vars.RUN_EVALS == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run promptfoo evals
        run: pnpm eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
