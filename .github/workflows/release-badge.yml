name: Update README release badge

on:
  release:
    types: [published]
  # Manual dispatch for testing without cutting a real release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the badge (e.g. v2.0.2)'
        required: true

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Rewrite README badge
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "::error::no tag provided"
            exit 1
          fi
          # Normalise to leading 'v'.
          DISPLAY="${TAG#v}"
          DISPLAY="v${DISPLAY}"
          # Update the badge image URL (preserves the color hex via \1).
          sed -i -E "s|badge/Release-v[0-9]+\.[0-9]+\.[0-9]+-([A-Fa-f0-9]+)|badge/Release-${DISPLAY}-\1|" README.md
          # Update the alt text.
          sed -i -E "s|alt=\"Release v[0-9]+\.[0-9]+\.[0-9]+\"|alt=\"Release ${DISPLAY}\"|" README.md
          echo "rewrote README for ${DISPLAY}"

      - name: Commit + push if changed
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          if git diff --quiet README.md; then
            echo "no changes — badge already at ${TAG}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(release): bump README badge to ${TAG}"
          git push
