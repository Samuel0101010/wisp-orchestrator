name: Bug report
description: Report a reproducible bug in WISP
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please provide enough detail
        for us to reproduce the issue locally.

        **Security issues** must not be filed here — see [SECURITY.md](../blob/main/SECURITY.md)
        for the private disclosure process.
  - type: input
    id: wisp-version
    attributes:
      label: WISP version
      description: Run "claude plugin list" or check plugin.json
      placeholder: e.g. 1.7.12
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area of WISP does this bug affect?
      options:
        - Dashboard UI
        - Orchestrator (subprocess)
        - Plan / Goal Planner
        - Memory MCP
        - CLI / Plugin install
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps that reliably reproduce the issue.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant lines from .wisp/logs/* or claude debug output
      render: shell
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: OS + Node version
      description: e.g. Windows 11 / Node 20.10 / pnpm 9.0
      placeholder: Windows 11 / Node 20.10 / pnpm 9.0
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues
          required: true
        - label: I have read SECURITY.md if this could be a security issue
          required: true
