name: Feature request
description: Suggest an idea or enhancement
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement. Please describe the
        user-visible problem first, then your proposed solution. Concrete use cases
        help us prioritize.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user-visible problem are you solving?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe the change you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why they were not chosen.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area of WISP would this affect?
      options:
        - Dashboard UI
        - Orchestrator (subprocess)
        - Plan / Goal Planner
        - Memory MCP
        - CLI / Plugin install
        - Other
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: I have searched existing issues / discussions
      options:
        - label: I have searched existing issues and discussions for duplicates
          required: true
